name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run basic test (import check)
      run: |
        python -c "import pandas, numpy, sklearn, fastapi"

    - name: Run drift check (sanity)
      run: |
        python monitoring/drift.py

    - name: Build Docker image
      run: |
        docker build -t engine-failure-api -f docker/Dockerfile .
